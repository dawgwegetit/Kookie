<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 For Kookie 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Fredoka:wght@600&family=Pacifico&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

:root {
--pink: #ff8fc5;
--pink-dark: #ff4fa0;
--cream: #1a0a14;
--plum: #ffd0e4;
}

body {
min-height: 100vh;
background:
radial-gradient(circle at 20% 30%, #3a0f28 0%, transparent 50%),
radial-gradient(circle at 80% 70%, #1f0a2a 0%, transparent 50%),
linear-gradient(135deg, #0d0510 0%, #1a0a1f 100%);
font-family: 'Fredoka', sans-serif;
display: flex;
align-items: center;
justify-content: center;
overflow: hidden;
position: relative;
color: var(--plum);
}

/* floating hearts bg */
.bg-hearts {
position: fixed;
inset: 0;
pointer-events: none;
z-index: 0;
}
.bg-hearts span {
position: absolute;
font-size: 24px;
opacity: 0.55;
filter: drop-shadow(0 0 6px rgba(255, 111, 174, 0.6));
animation: float 8s ease-in-out infinite;
}
@keyframes float {
0%, 100% { transform: translateY(0) rotate(-10deg); }
50% { transform: translateY(-20px) rotate(10deg); }
}

.stage {
position: relative;
z-index: 2;
text-align: center;
padding: 40px;
}

.message {
font-family: 'Pacifico', cursive;
font-size: clamp(60px, 15vw, 140px);
color: #fff;
min-height: 180px;
display: flex;
align-items: center;
justify-content: center;
gap: 20px;
text-shadow: 0 0 18px rgba(255, 79, 160, 0.95), 0 0 40px rgba(255, 111, 174, 0.6), 3px 3px 0 #ff4fa0;
flex-wrap: wrap;
}

.word {
display: inline-block;
opacity: 0;
transform: translateY(30px) scale(0.5);
animation: pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
@keyframes pop {
to { opacity: 1; transform: translateY(0) scale(1); }
}

.tap-btn {
font-family: 'Fredoka', sans-serif;
font-size: 28px;
padding: 22px 60px;
border: none;
border-radius: 100px;
background: linear-gradient(135deg, #ff4fa0 0%, #ff8fc5 100%);
color: #1a0512;
cursor: pointer;
box-shadow: 0 8px 0 #b8296b, 0 0 30px rgba(255, 143, 197, 0.7), 0 12px 40px rgba(255, 79, 160, 0.6);
transition: all 0.15s;
margin-top: 40px;
letter-spacing: 1px;
position: relative;
font-weight: 600;
}
.tap-btn::before {
content: '✨';
position: absolute;
left: 20px;
top: 50%;
transform: translateY(-50%);
}
.tap-btn::after {
content: '✨';
position: absolute;
right: 20px;
top: 50%;
transform: translateY(-50%);
}
.tap-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 0 #b8296b, 0 0 40px rgba(255, 143, 197, 0.9), 0 14px 45px rgba(255, 79, 160, 0.75); }
.tap-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #b8296b, 0 4px 15px rgba(255, 79, 160, 0.5); }

.hint {
font-family: 'Caveat', cursive;
font-size: 22px;
color: #ffd0e4;
margin-top: 15px;
opacity: 1;
text-shadow: 0 0 10px rgba(255, 143, 197, 0.6);
}

/* CHAOS MODE */
.chaos body, body.chaos {
animation: shake 0.3s infinite;
}
@keyframes shake {
0%, 100% { transform: translate(0, 0) rotate(0); }
25% { transform: translate(-5px, 3px) rotate(-1deg); }
50% { transform: translate(4px, -3px) rotate(1deg); }
75% { transform: translate(-3px, 4px) rotate(-0.5deg); }
}

body.chaos .message {
animation: rainbow 1s linear infinite, mega-pulse 0.5s ease-in-out infinite;
}
@keyframes rainbow {
0% { color: #ff1493; filter: hue-rotate(0deg); }
100% { color: #ff1493; filter: hue-rotate(360deg); }
}
@keyframes mega-pulse {
0%, 100% { transform: scale(1); }
50% { transform: scale(1.1); }
}

body.chaos {
background: linear-gradient(135deg, #ff6fae, #ffd700, #ff69b4, #00ced1, #ff6fae);
background-size: 400% 400%;
animation: gradient-chaos 3s ease infinite, shake 0.3s infinite;
}
@keyframes gradient-chaos {
0%, 100% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
}

.waifu {
position: fixed;
font-size: 100px;
z-index: 10;
pointer-events: none;
animation: waifu-dance 1.5s ease-in-out infinite;
}
@keyframes waifu-dance {
0%, 100% { transform: rotate(-15deg) scale(1); }
25% { transform: rotate(15deg) scale(1.2); }
50% { transform: rotate(-10deg) scale(0.9); }
75% { transform: rotate(10deg) scale(1.1); }
}

.confetti {
position: fixed;
width: 12px;
height: 12px;
z-index: 9;
pointer-events: none;
animation: fall 3s linear forwards;
}
@keyframes fall {
0% { transform: translateY(-100vh) rotate(0); opacity: 1; }
100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

.big-heart {
position: fixed;
font-size: 200px;
z-index: 11;
pointer-events: none;
animation: heart-fly 4s ease-out forwards;
}
@keyframes heart-fly {
0% { transform: scale(0) rotate(0); opacity: 1; }
50% { transform: scale(1.5) rotate(180deg); opacity: 1; }
100% { transform: scale(0.5) rotate(360deg); opacity: 0; }
}

.final-msg {
position: fixed;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
font-family: 'Pacifico', cursive;
font-size: clamp(40px, 8vw, 100px);
color: white;
text-shadow: 0 0 30px #ff1493, 0 0 60px #ff1493, 4px 4px 0 #2a0a1a, 8px 8px 40px rgba(0,0,0,0.6);
z-index: 20;
text-align: center;
opacity: 0;
animation: final-appear 1s ease-out 1.5s forwards;
pointer-events: none;
}
@keyframes final-appear {
0% { opacity: 0; transform: translate(-50%, -50%) scale(0); }
100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}
</style>

</head>
<body>
  <div class="bg-hearts" id="bgHearts"></div>

  <!-- Your cute voice recording plays during chaos mode -->

<audio id="voiceClip" src="i-lobe-kookie.m4a" preload="auto"></audio>

  <div class="stage">
    <div class="message" id="message"></div>
    <button class="tap-btn" id="tapBtn" onclick="tap()">Tap me 💕</button>
    <div class="hint" id="hint">pssst... keep tapping 👀</div>
  </div>

<script>
  // decorative bg hearts
  const bg = document.getElementById('bgHearts');
  const emojis = ['💕','💖','💗','🌸','✨','🦋','💝'];
  for (let i = 0; i < 25; i++) {
    const s = document.createElement('span');
    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = Math.random() * 8 + 's';
    s.style.fontSize = (15 + Math.random() * 25) + 'px';
    bg.appendChild(s);
  }

  const words = ['I', 'Love', 'Kookie 🥹💘'];
  let step = 0;
  const msg = document.getElementById('message');
  const btn = document.getElementById('tapBtn');
  const hint = document.getElementById('hint');

  function tap() {
    if (step >= words.length) return;

    const span = document.createElement('span');
    span.className = 'word';
    span.textContent = words[step];
    span.style.animationDelay = '0s';
    msg.appendChild(span);

    step++;

    if (step === words.length) {
      btn.style.display = 'none';
      hint.style.display = 'none';
      setTimeout(chaosMode, 400);
    } else if (step === 2) {
      btn.textContent = 'One more 🥺';
    }
  }

  function chaosMode() {
    document.body.classList.add('chaos');

    // play your cute voice recording 🥹
    const voice = document.getElementById('voiceClip');
    if (voice && voice.src) {
      voice.volume = 1.0;
      voice.currentTime = 0;
      voice.play().catch(() => console.log('voice clip not found or blocked'));
      // replay it a couple times during chaos
      let replays = 0;
      voice.onended = () => {
        if (replays < 3) {
          replays++;
          setTimeout(() => { voice.currentTime = 0; voice.play(); }, 800);
        }
      };
    }

    // waifu emojis dancing everywhere
    const waifus = ['👯‍♀️','💃','🌸','🎀','🦄','🌈','👑','💖','🍭','🧚‍♀️','🦋','⭐'];
    for (let i = 0; i < 30; i++) {
      setTimeout(() => {
        const w = document.createElement('div');
        w.className = 'waifu';
        w.textContent = waifus[Math.floor(Math.random() * waifus.length)];
        w.style.left = Math.random() * 90 + '%';
        w.style.top = Math.random() * 90 + '%';
        w.style.fontSize = (60 + Math.random() * 80) + 'px';
        w.style.animationDelay = Math.random() * 1 + 's';
        document.body.appendChild(w);
      }, i * 80);
    }

    // confetti rain
    const colors = ['#ff1493','#ff69b4','#ffd700','#00ced1','#ff6fae','#ffffff','#ff4081'];
    for (let i = 0; i < 80; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + '%';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.animationDuration = (2 + Math.random() * 2) + 's';
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }, i * 50);
    }

    // big flying hearts
    for (let i = 0; i < 8; i++) {
      setTimeout(() => {
        const h = document.createElement('div');
        h.className = 'big-heart';
        h.textContent = ['💖','💘','💝','❤️','💗'][Math.floor(Math.random() * 5)];
        h.style.left = Math.random() * 80 + 10 + '%';
        h.style.top = Math.random() * 80 + 10 + '%';
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 4000);
      }, i * 300);
    }

    // final big message
    setTimeout(() => {
      const final = document.createElement('div');
      final.className = 'final-msg';
      final.innerHTML = 'FOREVER YOURS<br>MY KOOKIE 💘';
      document.body.appendChild(final);
    }, 1000);

    // play chaotic music (web audio api synthesized happy chimes loop)
    playMusic();
  }

  function playMusic() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      // cute arpeggio - C major happy bops
      const notes = [523.25, 659.25, 783.99, 1046.5, 783.99, 659.25, 880, 1046.5];
      let t = ctx.currentTime;
      const loops = 8;
      for (let l = 0; l < loops; l++) {
        notes.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'triangle';
          osc.frequency.value = freq * (1 + l * 0.05);
          gain.gain.setValueAtTime(0, t);
          gain.gain.linearRampToValueAtTime(0.05, t + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
          osc.connect(gain).connect(ctx.destination);
          osc.start(t);
          osc.stop(t + 0.3);
          t += 0.15;
        });
      }
      // bass bloops
      let bt = ctx.currentTime;
      for (let i = 0; i < 32; i++) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = i % 2 === 0 ? 130.81 : 196;
        gain.gain.setValueAtTime(0, bt);
        gain.gain.linearRampToValueAtTime(0.08, bt + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, bt + 0.4);
        osc.connect(gain).connect(ctx.destination);
        osc.start(bt);
        osc.stop(bt + 0.5);
        bt += 0.3;
      }
    } catch(e) {
      console.log('audio not available');
    }
  }
</script>

</body>
</html>
